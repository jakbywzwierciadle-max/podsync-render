services:
  - type: web
    name: podsync-web
    env: go
    plan: free
    buildCommand: go build ./cmd/podsync
    startCommand: ./podsync serve --port $PORT
    envVars:
      - key: PODSYNC_PORT
        value: $PORT
      - key: PODSYNC_DATA_DIR
        value: /opt/render/data
      - key: PODSYNC_AUTH_ENABLED
        value: "false"
      - key: PODSYNC_BASE_URL
        value: "https://twoja-aplikacja.onrender.com"
    persistentDisk:
      name: podsync-data
      mountPath: /opt/render/data
      sizeGB: 1
