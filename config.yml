# Plik config.yml dla Podsync na Render
storage:
  type: local
  path: /tmp/data   # Render wymaga /tmp lub Persistent Disk, jeśli chcesz dane zachować

# Lista kanałów/feedów do synchronizacji
feeds:
  - url: https://www.youtube.com/c/PrzykladowyKanal1
    name: kanal1
    format: mp4     # format wideo
    quality: best   # najlepsza jakość

  - url: https://www.youtube.com/c/PrzykladowyKanal2
    name: kanal2
    format: mp4
    quality: best

  - url: https://www.youtube.com/c/PrzykladowyKanal3
    name: kanal3
    format: mp4
    quality: best

# Opcjonalnie: ustawienia serwera RSS (jeżeli chcesz podłączyć do podcasta)
server:
  host: 0.0.0.0
  port: 8080
  base_url: https://twoja-domena.onrender.com  # wstaw URL swojej aplikacji Render
